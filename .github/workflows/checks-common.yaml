name: Reusable common checks

on:
  workflow_call:
    inputs:
      paths-ignore:
        description: Paths to ignore, ex. ["foo", "bar/**"]
        required: false
        type: string

env:
  CLICOLOR: 1

jobs:
  check-common:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: atls/shared
          path: .atls-shared

      - name: Prepare spell check config
        env:
          PATHS_IGNORE: ${{ inputs.paths-ignore || '[]' }}
        run: |
          paths_ignore="$(jq -c '
            if type == "array" and all(.[]; type == "string") then
              .
            else
              error("paths-ignore must be a JSON array of strings")
            end
          ' <<< "$PATHS_IGNORE")"

          awk -v paths="$paths_ignore" '
            $0 == "extend-exclude = []" && !updated {
              print "extend-exclude = " paths
              updated = 1
              next
            }
            { print }
            END { if (!updated) exit 1 }
          ' .atls-shared/.github/typos.toml > typos.generated.toml

      - name: Spell Check Repo
        uses: crate-ci/typos@v1.43.2
        with:
          config: ./typos.generated.toml

      - name: Lint commits
        uses: wagoid/commitlint-github-action@v6
        with:
          commitDepth: 1
