name: Reusable docker image publish

on:
  workflow_call:
    inputs:
      packageName:
        required: true
        type: string
        description: Image name
      branchName:
        required: true
        type: string
        description: Branch name
      contextLocation:
        required: true
        type: string
        description: Location of context for building image
      target:
        required: false
        type: string
        default: ''
        description: Optional Dockerfile stage target
      buildArgs:
        required: false
        type: string
        default: ''
        description: Optional Docker build arguments (newline-delimited KEY=VALUE)
      isProd:
        default: false
        required: false
        type: boolean

    secrets:
      token:
        description: Token for publishing image
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: ci-builder

      - uses: actions/checkout@v6

      - name: Determine tags
        id: tags
        run: |
          echo "commitSha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build and push stage image
        if: ${{ inputs.isProd == false }}
        uses: docker/build-push-action@v6
        with:
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.packageName }}:stage
            ghcr.io/${{ github.repository_owner }}/${{ inputs.packageName }}:stage-${{ steps.tags.outputs.commitSha }}-${{ steps.tags.outputs.date }}
          cache-from: type=gha,scope=${{ inputs.packageName }}
          cache-to: type=gha,scope=${{ inputs.packageName }}
          context: ${{ inputs.contextLocation }}
          target: ${{ inputs.target }}
          build-args: ${{ inputs.buildArgs }}

      - name: Build and push prod image
        if: ${{ inputs.isProd == true }}
        uses: docker/build-push-action@v6
        with:
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.packageName }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.packageName }}:prod
            ghcr.io/${{ github.repository_owner }}/${{ inputs.packageName }}:prod-${{ steps.tags.outputs.commitSha }}-${{ steps.tags.outputs.date }}
          cache-from: type=gha,scope=${{ inputs.packageName }}
          cache-to: type=gha,scope=${{ inputs.packageName }}
          context: ${{ inputs.contextLocation }}
          target: ${{ inputs.target }}
          build-args: ${{ inputs.buildArgs }}
