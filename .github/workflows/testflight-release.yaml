name: Reusable IOS TestFlight Release

on:
  workflow_call:
    inputs:
      ios_scheme:
        type: string
        required: false
        default: iosApp

      ios_workspace:
        type: string
        required: true

      ios_team_id:
        type: string
        required: true

      ios_bundle_id:
        type: string
        required: true

      export_options_plist:
        type: string
        required: false
        default: iosApp/ExportOptions.AppStore.plist

      cocoapods_working_directory:
        type: string
        required: false
        default: ""

      pre_pod_install_command:
        type: string
        required: false
        default: ""

    secrets:
      IOS_CERTIFICATE_P12_BASE64:
        required: true
      IOS_CERTIFICATE_PASSWORD:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_PRIVATE_KEY:
        required: true
      LOCAL_PROPERTIES_CONTENT:
        required: true

concurrency:
  group: ios-testflight-reusable-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  release-to-testflight:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      IOS_SCHEME: ${{ inputs.ios_scheme }}
      IOS_WORKSPACE: ${{ inputs.ios_workspace }}
      IOS_TEAM_ID: ${{ inputs.ios_team_id }}
      IOS_BUNDLE_ID: ${{ inputs.ios_bundle_id }}
      EXPORT_OPTIONS_PLIST: ${{ inputs.export_options_plist }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/gradle.properties','settings.gradle.kts','gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - uses: actions/cache@v5
        if: ${{ inputs.cocoapods_working_directory != '' }}
        with:
          path: |
            ${{ inputs.cocoapods_working_directory }}/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: pods-${{ runner.os }}-${{ inputs.cocoapods_working_directory }}-${{ hashFiles(format('{0}/Podfile', inputs.cocoapods_working_directory), format('{0}/Podfile.lock', inputs.cocoapods_working_directory)) }}
          restore-keys: |
            pods-${{ runner.os }}-${{ inputs.cocoapods_working_directory }}-
            pods-${{ runner.os }}-

      - uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-derived-${{ runner.os }}-${{ hashFiles('**/*.pbxproj','**/*.xcodeproj/**','**/*.xcworkspace/**') }}
          restore-keys: |
            xcode-derived-${{ runner.os }}-

      - name: Create local.properties
        run: |
          cat > local.properties <<'EOF'
          ${{ secrets.LOCAL_PROPERTIES_CONTENT }}
          EOF

      - name: Pre Pod Install
        if: ${{ inputs.pre_pod_install_command != '' }}
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ${{ inputs.pre_pod_install_command }}

      - name: Install CocoaPods
        if: ${{ inputs.cocoapods_working_directory != '' }}
        working-directory: ${{ inputs.cocoapods_working_directory }}
        run: |
          set -euo pipefail
          pod install

      - uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - uses: apple-actions/download-provisioning-profiles@v4
        with:
          bundle-id: ${{ env.IOS_BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

      - name: Archive
        run: |
          set -euo pipefail

          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/$IOS_SCHEME.xcarchive" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            clean archive

      - name: Export IPA
        run: |
          set -euo pipefail

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/$IOS_SCHEME.xcarchive" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates

          IPA_PATH="$(find "$RUNNER_TEMP/export" -maxdepth 1 -type f -name '*.ipa' | head -n 1)"
          test -n "$IPA_PATH"
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
